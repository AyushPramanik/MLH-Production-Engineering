<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident Response Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Incident Response</a>
    <div class="ms-auto text-white small">Monitoring console</div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-3">
      <div class="card mb-3">
        <div class="card-body">
          <h6 class="card-title">Service Status</h6>
          <p id="service-status" class="h5 text-success">—</p>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6 class="card-title">Alert Status</h6>
          <div id="alert-status">Loading…</div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6 class="card-title">Uptime</h6>
          <div id="uptime">—</div>
        </div>
      </div>

      <!-- Action buttons removed for production dashboard -->
    </div>

    <div class="col-md-9">
      <div class="row mb-3 gx-2 gy-2">
        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title">Latency (ms)</h6>
              <div class="chart-container"><canvas id="latencyChart"></canvas></div>
              <div class="small text-muted mt-1">p95: <span id="latency-p95">—</span></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title">Traffic (req/s)</h6>
              <div class="chart-container"><canvas id="trafficChart"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body">
              <h6 class="card-title">Errors</h6>
              <div class="chart-container"><canvas id="errorsChart"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body text-center">
              <h6 class="card-title">Saturation</h6>
              <div class="chart-container" style="height:140px;"><canvas id="saturationChart"></canvas></div>
              <div class="small text-muted mt-1">max(cpu, mem)</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6 class="card-title">System</h6>
          <div id="memory-info">—</div>
          <div id="cpu-info" class="mt-2">—</div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h6 class="card-title">Recent Logs</h6>
          <pre id="logs" class="logs">Loading...</pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
